<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivio · Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #E91E63;
            --accent: #FF1493;
            --bg: #0f0f0f;
            --surface: #181818;
            --surface2: #222222;
            --border: rgba(255, 255, 255, 0.07);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.38);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding: 2rem;
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.18) 0%, transparent 70%);
            top: -150px;
            left: -150px;
            animation: pulse-glow 6s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.12) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: pulse-glow 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulse-glow {
            from {
                opacity: 0.6;
                transform: scale(1);
            }

            to {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 3rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
        }

        .logo span {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .card-subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.6rem;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1.05rem;
            font-family: inherit;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            transition: all 0.25s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.15);
            transform: translateY(-1px);
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .switch-mode {
            text-align: center;
            margin-top: 2rem;
            color: var(--muted);
            font-size: 1rem;
        }

        .switch-mode a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .switch-mode a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .toast.success {
            background: #10B981;
            color: white;
        }

        .toast.error {
            background: #EF4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* User Type Selector */
        .user-type-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
            background: var(--bg);
            padding: 0.5rem;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .user-type-btn {
            flex: 1;
            padding: 1rem 1.25rem;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            position: relative;
            z-index: 1;
        }

        .user-type-btn.active {
            color: white;
        }

        .user-type-btn:hover:not(.active) {
            color: var(--text);
        }

        /* Sliding indicator for animation */
        .selector-indicator {
            position: absolute;
            top: 0.5rem;
            bottom: 0.5rem;
            width: calc(50% - 0.5rem);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
        }

        .selector-indicator.empresa {
            transform: translateX(100%);
        }

        /* Form content animation container */
        .form-content {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateX(0);
        }

        .form-content.slide-left {
            animation: slideContentLeft 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .form-content.slide-right {
            animation: slideContentRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideContentLeft {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-30px);
            }
        }

        @keyframes slideContentRight {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(30px);
            }
        }

        @keyframes slideContentReset {
            0% {
                opacity: 0;
                transform: translateX(30px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideContentResetReverse {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-content.reset-left {
            animation: slideContentResetReverse 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .form-content.reset-right {
            animation: slideContentReset 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Welcome text animation */
        .welcome-text {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-text.switching {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* Empresa Fields - Hidden by default */
        .empresa-fields {
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .empresa-fields.show {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .empresa-fields.slide-out-left {
            animation: slideOutLeft 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .empresa-fields.slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideOutLeft {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-20px);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Candidato fields animation */
        .candidato-fields {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .candidato-fields.slide-out-right {
            animation: slideOutRight 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .candidato-fields.slide-in-left {
            animation: slideInLeft 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideOutRight {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <polygon points="12,2 15,10 23,10 17,15 19,23 12,18 5,23 7,15 1,10 9,10" fill="currentColor"
                    opacity="0.8" />
                <polygon points="12,6 14,12 20,12 15,16 17,22 12,18 7,22 9,16 4,12 10,12" fill="currentColor"
                    opacity="1" />
            </svg>
            <span>Trivio</span>
        </div>

        <div class="card">
            <h2 class="card-title welcome-text" id="cardTitle">Criar sua conta</h2>
            <p class="card-subtitle welcome-text" id="cardSubtitle">Junte-se à plataforma de recrutamento</p>

            <!-- User Type Selector -->
            <div class="user-type-selector">
                <div class="selector-indicator" id="selectorIndicator"></div>
                <button type="button" class="user-type-btn active" data-type="candidato"
                    onclick="selectUserType('candidato')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    Candidato
                </button>
                <button type="button" class="user-type-btn" data-type="empresa" onclick="selectUserType('empresa')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Empresa
                </button>
            </div>

            <form id="registerForm">
                <!-- Candidato Fields -->
                <div id="candidatoFields" class="candidato-fields">
                    <div class="form-group">
                        <label class="form-label" for="nome">Nome Completo</label>
                        <input type="text" id="nome" class="form-input" placeholder="Seu nome completo">
                    </div>
                </div>

                <!-- Empresa Fields -->
                <div id="empresaFields" class="empresa-fields">
                    <div class="form-group">
                        <label class="form-label" for="nomeEmpresa">Nome da Empresa</label>
                        <input type="text" id="nomeEmpresa" class="form-input" placeholder="Nome da sua empresa">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cnpj">CNPJ</label>
                        <input type="text" id="cnpj" class="form-input" placeholder="00.000.000/0001-00" maxlength="18">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmar Senha</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">Criar Conta</button>
            </form>

            <div class="switch-mode">
                Já tem uma conta? <a href="login.html">Entrar</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let selectedUserType = 'candidato';
        let isAnimating = false;

        function selectUserType(type) {
            if (isAnimating || type === selectedUserType) return;

            isAnimating = true;
            const cardTitle = document.getElementById('cardTitle');
            const cardSubtitle = document.getElementById('cardSubtitle');
            const indicator = document.getElementById('selectorIndicator');
            const empresaFields = document.getElementById('empresaFields');
            const candidatoFields = document.getElementById('candidatoFields');

            // Determine direction based on type
            const isToEmpresa = type === 'empresa';

            // Update indicator position
            indicator.classList.toggle('empresa', isToEmpresa);

            // Animate title and subtitle
            cardTitle.classList.add('switching');
            cardSubtitle.classList.add('switching');

            // Animate fields
            if (isToEmpresa) {
                candidatoFields.classList.add('slide-out-right');
                empresaFields.classList.add('slide-in-right');
            } else {
                empresaFields.classList.add('slide-out-left');
                candidatoFields.classList.add('slide-in-left');
            }

            // Update button states
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });

            // After first animation, switch fields display
            setTimeout(() => {
                // Update title and subtitle text
                if (type === 'empresa') {
                    cardTitle.textContent = 'Cadastro Empresarial';
                    cardSubtitle.textContent = 'Registre sua empresa na plataforma';
                } else {
                    cardTitle.textContent = 'Criar sua conta';
                    cardSubtitle.textContent = 'Junte-se à plataforma de recrutamento';
                }

                // Toggle field visibility
                empresaFields.classList.toggle('show', isToEmpresa);

                selectedUserType = type;

                // After toggle, reset animations
                setTimeout(() => {
                    candidatoFields.classList.remove('slide-out-right', 'slide-in-left');
                    empresaFields.classList.remove('slide-out-left', 'slide-in-right');
                    cardTitle.classList.remove('switching');
                    cardSubtitle.classList.remove('switching');
                    isAnimating = false;
                }, 50);
            }, 350);
        }

        // CNPJ formatting
        document.getElementById('cnpj').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 2) value = value.replace(/^(\d{2})(\d)/, '$1.$2');
            if (value.length > 5) value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
            if (value.length > 8) value = value.replace(/^(\d{2})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3/$4');
            if (value.length > 12) value = value.replace(/^(\d{2})\.(\d{3})\.(\d{3})\/(\d{4})(\d)/, '$1.$2.$3/$4-$5');
            e.target.value = value;
        });

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (isError ? 'error' : 'success');
            toast.style.display = 'block';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');

            if (password !== confirmPassword) {
                showToast('As senhas não coincidem!', true);
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Criando conta...';

            // Monta o payload conforme o tipo
            const payload = {
                tipo: selectedUserType,
                nome: selectedUserType === 'candidato'
                    ? document.getElementById('nome').value.trim()
                    : document.getElementById('nomeEmpresa').value.trim(),
                email: document.getElementById('email').value.trim(),
                senha: password
            };
            if (selectedUserType === 'empresa') {
                payload.cnpj = document.getElementById('cnpj').value.trim();
            }

            try {
                const resposta = await fetch('https://trivio-production.up.railway.app/api/v1/auth/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    showToast(dados.erro || 'Erro ao criar conta', true);
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Criar Conta';
                    return;
                }

                // Salva dados do usuário na sessão
                sessionStorage.setItem('usuario', JSON.stringify(dados.usuario));
                const token = dados.token || dados.usuario?.token;
                if (token) {
                    sessionStorage.setItem('token', token);
                }

                showToast('Conta criada com sucesso! Redirecionando...', false);

                setTimeout(() => {
                    if (selectedUserType === 'candidato') {
                        window.location.href = '/frontend/tela-principal/index.html';
                    } else {
                        window.location.href = '/Empresas/tela-principal/index.html';
                    }
                }, 1400);

            } catch (err) {
                console.error(err);
                showToast('Não foi possível conectar ao servidor', true);
                registerBtn.disabled = false;
                registerBtn.textContent = 'Criar Conta';
            }
        });
    </script>
</body>

</html>
