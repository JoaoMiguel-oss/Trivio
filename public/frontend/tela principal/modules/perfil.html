<!-- ===== DASHBOARD DO DESENVOLVEDOR ===== -->
<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --accent-glow: rgba(233, 30, 99, 0.3);
    }

    .dashboard-wrapper {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        max-width: 1300px;
        margin: 0 auto;
        padding: 1rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* --- Top Performance Section --- */
    .dashboard-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
        margin-bottom: 2.5rem;
    }

    .hero-card {
        background: linear-gradient(135deg, rgba(20, 20, 20, 0.8), rgba(10, 10, 10, 0.9));
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 2.5rem;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .hero-card::after {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        opacity: 0.4;
        pointer-events: none;
    }

    .hero-profile {
        display: flex;
        align-items: center;
        gap: 2rem;
        z-index: 1;
    }

    .hero-avatar {
        width: 100px;
        height: 100px;
        border-radius: 24px;
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
        position: relative;
    }

    .hero-details h1 {
        font-size: 2.4rem;
        font-weight: 800;
        margin: 0;
        letter-spacing: -1px;
        background: linear-gradient(to right, #fff, #aaa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-details p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.1rem;
        margin: 0.5rem 0 0;
    }

    /* --- Financial Card --- */
    .balance-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 2rem;
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.3s ease;
    }

    .balance-card:hover {
        transform: translateY(-5px);
        border-color: rgba(233, 30, 99, 0.3);
    }

    .balance-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .balance-label {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 700;
    }

    .balance-amount {
        font-size: 2.8rem;
        font-weight: 800;
        color: white;
        margin: 0.5rem 0;
    }

    .balance-footer {
        margin-top: auto;
    }

    .btn-withdraw {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        background: white;
        color: black;
        border: none;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-withdraw:hover {
        background: var(--color-primary);
        color: white;
        box-shadow: 0 10px 20px rgba(233, 30, 99, 0.3);
    }

    /* --- Stats Bar --- */
    .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
        margin-bottom: 3rem;
    }

    .stat-box {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        padding: 1.5rem;
        border-radius: 20px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .stat-box:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.15);
    }

    .stat-val {
        display: block;
        font-size: 2rem;
        font-weight: 800;
        color: var(--color-primary);
        margin-bottom: 0.2rem;
    }

    .stat-lbl {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        font-weight: 600;
    }

    /* --- History Section --- */
    .history-section {
        margin-top: 4rem;
    }

    .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .history-title-group h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: white;
        margin: 0;
    }

    .history-title-group p {
        color: rgba(255, 255, 255, 0.4);
        margin-top: 0.3rem;
    }

    .history-filters {
        display: flex;
        gap: 1rem;
    }

    .filter-select {
        background: #111;
        border: 1px solid var(--glass-border);
        color: #ddd;
        padding: 0.6rem 1.2rem;
        border-radius: 12px;
        font-size: 0.9rem;
        cursor: pointer;
        outline: none;
    }

    .filter-select:focus {
        border-color: var(--color-primary);
    }

    .challenges-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1.5rem;
    }

    .challenge-card {
        background: rgba(20, 20, 20, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 1.8rem;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
    }

    .challenge-card:hover {
        transform: translateY(-5px);
        border-color: rgba(253, 30, 99, 0.4);
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        background: rgba(25, 25, 25, 0.8);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
    }

    .card-badge {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        padding: 0.3rem 0.8rem;
        border-radius: 8px;
        letter-spacing: 0.5px;
    }

    .badge-approved { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .badge-pending { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .badge-review { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

    .card-score {
        font-weight: 900;
        color: var(--color-primary);
        font-size: 1.2rem;
    }

    .card-content h3 {
        font-size: 1.3rem;
        font-weight: 700;
        color: white;
        margin: 0.5rem 0;
    }

    .card-company {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .card-footer {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .card-meta {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.3);
    }

    .card-reward {
        font-weight: 700;
        color: #22c55e;
        font-size: 0.95rem;
    }

    /* --- Utilities --- */
    .empty-state {
        grid-column: 1 / -1;
        padding: 5rem;
        text-align: center;
        background: var(--glass-bg);
        border-radius: 24px;
        border: 1px dashed var(--glass-border);
    }

    .empty-state svg {
        width: 64px;
        height: 64px;
        color: rgba(255, 255, 255, 0.1);
        margin-bottom: 1.5rem;
    }

    .btn-action {
        background: var(--color-primary);
        color: white;
        padding: 0.8rem 2rem;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        margin-top: 1rem;
    }

    @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr; }
        .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<div class="dashboard-wrapper">
    <!-- --- Performance Hero --- -->
    <div class="dashboard-grid">
        <div class="hero-card">
            <div class="hero-profile">
                <div class="hero-avatar" id="dev-avatar">--</div>
                <div class="hero-details">
                    <h1 id="dev-welcome">Dashboard</h1>
                    <p id="dev-email">Seu resumo de atividades e conquistas</p>
                </div>
            </div>
        </div>

        <div class="balance-card">
            <div class="balance-header">
                <span class="balance-label">Saldo Disponível</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="balance-amount" id="dev-balance">R$ 0,00</div>
            <div class="balance-footer">
                <button class="btn-withdraw" onclick="solicitarSaque()">Resgatar Saldo</button>
            </div>
        </div>
    </div>

    <!-- --- Quick Stats --- -->
    <div class="stats-bar">
        <div class="stat-box">
            <span class="stat-val" id="stat-count">0</span>
            <span class="stat-lbl">Desafios</span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="stat-delivered">0</span>
            <span class="stat-lbl">Entregues</span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="stat-hired">0</span>
            <span class="stat-lbl">Avançaram</span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="stat-score">0.0</span>
            <span class="stat-lbl">Score Médio</span>
        </div>
    </div>

    <!-- --- Solved Challenges --- -->
    <div class="history-section">
        <div class="history-header">
            <div class="history-title-group">
                <h2>Histórico de Desafios</h2>
                <p>Acompanhe seu progresso técnico</p>
            </div>
            <div class="history-filters">
                <select class="filter-select" id="filter-status" onchange="applyFilters()">
                    <option value="all">Todos os Status</option>
                    <option value="delivered">Entregues</option>
                    <option value="approved">Aprovados</option>
                </select>
                <select class="filter-select" id="sort-order" onchange="applyFilters()">
                    <option value="recent">Mais Recentes</option>
                    <option value="score">Melhor Score</option>
                </select>
            </div>
        </div>

        <div class="challenges-grid" id="history-container">
            <!-- Shimmer / Loading State -->
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                <p>Carregando seu histórico de conquistas...</p>
            </div>
        </div>
    </div>
</div>

<script>
    let myChallenges = [];

    // Initialize Dashboard
    async function initDashboard() {
        const user = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (!user.public_id) {
            window.location.hash = '#login';
            return;
        }

        // Setup Header
        document.getElementById('dev-welcome').textContent = user.nome || 'Desenvolvedor';
        document.getElementById('dev-email').textContent = user.email || 'Conta vinculada';
        
        const avatar = document.getElementById('dev-avatar');
        if (user.foto_url) {
            avatar.style.backgroundImage = `url(${user.foto_url})`;
            avatar.style.backgroundSize = 'cover';
            avatar.textContent = '';
        } else {
            avatar.textContent = (user.nome || 'U').charAt(0).toUpperCase();
        }

        await fetchChallenges(user.public_id);
    }

    async function fetchChallenges(userId) {
        try {
            const res = await fetch(`/api/v1/desafios/meus/${userId}`);
            if (!res.ok) throw new Error();
            myChallenges = await res.json();
            
            updateStats();
            renderChallenges(myChallenges);
        } catch (e) {
            console.error('Error fetching dashboard data:', e);
            document.getElementById('history-container').innerHTML = `
                <div class="empty-state">
                    <p>Não conseguimos carregar seus dados no momento.</p>
                </div>
            `;
        }
    }

    function updateStats() {
        const total = myChallenges.length;
        const delivered = myChallenges.filter(c => c.status === 'entregue').length;
        const hired = myChallenges.filter(c => c.avancou_entrevista).length;
        
        const evaluated = myChallenges.filter(c => c.score_ia > 0);
        const avgScore = evaluated.length > 0 
            ? (evaluated.reduce((a, b) => a + b.score_ia, 0) / evaluated.length).toFixed(1)
            : '0.0';

        // Calculate Balance (Sum of rewards from hired/approved challenges)
        const balance = myChallenges
            .filter(c => c.avancou_entrevista)
            .reduce((a, b) => a + (b.bolsa_tecnica || 0), 0);

        document.getElementById('stat-count').textContent = total;
        document.getElementById('stat-delivered').textContent = delivered;
        document.getElementById('stat-hired').textContent = hired;
        document.getElementById('stat-score').textContent = avgScore;
        document.getElementById('dev-balance').textContent = `R$ ${balance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
    }

    function renderChallenges(list) {
        const container = document.getElementById('history-container');
        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <p>Você ainda não participou de nenhum desafio técnico.</p>
                    <button class="btn-action" onclick="window.location.hash='#desafios'">Explorar Vagas</button>
                </div>
            `;
            return;
        }

        container.innerHTML = list.map(c => {
            const statusLabel = c.avancou_entrevista ? 'Aprovado' : (c.status === 'entregue' ? 'Avaliação' : 'Pendente');
            const statusClass = c.avancou_entrevista ? 'badge-approved' : (c.status === 'entregue' ? 'badge-review' : 'badge-pending');
            const score = c.score_ia ? c.score_ia.toFixed(1) : '--';
            const date = new Date(c.iniciado_em).toLocaleDateString('pt-BR');

            return `
                <div class="challenge-card">
                    <div class="card-top">
                        <span class="card-badge ${statusClass}">${statusLabel}</span>
                        <span class="card-score">${score}</span>
                    </div>
                    <div class="card-content">
                        <h3>${c.titulo}</h3>
                        <div class="card-company">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                            ${c.empresa_nome}
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="card-meta">Iniciado em ${date}</span>
                        <span class="card-reward">R$ ${(c.bolsa_tecnica || 0).toLocaleString('pt-BR')}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function applyFilters() {
        const status = document.getElementById('filter-status').value;
        const sort = document.getElementById('sort-order').value;

        let filtered = [...myChallenges];

        if (status === 'delivered') filtered = filtered.filter(c => c.status === 'entregue');
        if (status === 'approved') filtered = filtered.filter(c => c.avancou_entrevista);

        if (sort === 'score') {
            filtered.sort((a, b) => (b.score_ia || 0) - (a.score_ia || 0));
        } else {
            filtered.sort((a, b) => new Date(b.iniciado_em) - new Date(a.iniciado_em));
        }

        renderChallenges(filtered);
    }

    function solicitarSaque() {
        const user = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        const balanceTxt = document.getElementById('dev-balance').textContent;
        const rawValue = parseFloat(balanceTxt.replace('R$ ', '').replace('.', '').replace(',', '.'));

        if (rawValue <= 0) {
            alert('Você ainda não possui saldo disponível para resgate.');
            return;
        }

        alert(`Solicitação de resgate de ${balanceTxt} enviada com sucesso! O valor será creditado em sua conta pix vinculada em até 24h.`);
    }

    // Run on load
    initDashboard();
</script>
