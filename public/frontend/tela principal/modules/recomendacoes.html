<style>
    .recom-container {
        animation: fadeIn 0.4s ease;
    }

    .recom-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.5rem;
    }

    .recom-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 1.5rem;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        cursor: pointer;
    }

    .recom-card:hover {
        border-color: rgba(233, 30, 99, 0.4);
        background: rgba(233, 30, 99, 0.08);
        transform: translateY(-2px);
    }

    .recom-company {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1rem;
    }

    .company-avatar {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: bold;
        color: white;
        flex-shrink: 0;
    }

    .company-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
    }

    .recom-job-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.5rem;
    }

    .recom-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 1rem;
    }

    .recom-meta span {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(255, 255, 255, 0.05);
        padding: 3px 8px;
        border-radius: 6px;
    }

    .recom-desc {
        font-size: 0.88rem;
        color: rgba(255, 255, 255, 0.65);
        margin-bottom: 1.2rem;
        line-height: 1.5;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .btn-apply {
        width: 100%;
        padding: 10px;
        background: rgba(233, 30, 99, 0.1);
        border: 1px solid rgba(233, 30, 99, 0.3);
        border-radius: 8px;
        color: var(--color-primary);
        font-weight: 600;
        text-align: center;
        transition: 0.2s;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .recom-card:hover .btn-apply {
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        color: white;
        border-color: transparent;
    }

    .stat-card {
        background: linear-gradient(135deg, rgba(233, 30, 99, 0.1), rgba(255, 20, 147, 0.05));
        border: 1px solid rgba(233, 30, 99, 0.2);
        border-radius: 10px;
        padding: 18px 20px;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .modal-overlay.show {
        display: flex;
        opacity: 1;
    }

    .modal-content {
        background: #1a1a1a;
        border: 1px solid rgba(233, 30, 99, 0.3);
        border-radius: 16px;
        width: 100%;
        max-width: 650px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 2.5rem;
        position: relative;
        transform: translateY(20px);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.show .modal-content {
        transform: translateY(0);
    }

    .modal-close {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        font-size: 1.5rem;
    }

    .modal-section {
        margin-top: 1.5rem;
    }

    .modal-section-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--color-primary);
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-candidatar {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .btn-candidatar:hover {
        opacity: 0.85;
    }

    .btn-candidatar:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
</style>

<div class="recom-container">
    <div class="mb-8">
        <h1 style="font-size:1.8rem; font-weight:800; color:#fff;">Vagas com Desafio Técnico</h1>
        <p style="color:rgba(255,255,255,0.5); margin-top:5px;">Vagas com avaliação prática e bolsa técnica garantida,
            independente de contratação.</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">
        <div class="stat-card">
            <p style="color:rgba(255,255,255,0.5); font-size:0.82rem; margin-bottom:6px;">Total de Vagas</p>
            <h3 style="font-size:1.8rem; font-weight:800;" id="stat-total">0</h3>
            <p style="color:var(--color-accent); font-size:0.72rem; margin-top:6px;" id="stat-total-label">Carregando...
            </p>
        </div>
        <div class="stat-card">
            <p style="color:rgba(255,255,255,0.5); font-size:0.82rem; margin-bottom:6px;">Com Bolsa Técnica</p>
            <h3 style="font-size:1.8rem; font-weight:800;" id="stat-clt">0</h3>
            <p style="color:#22c55e; font-size:0.72rem; margin-top:6px;">Remuneração garantida</p>
        </div>
        <div class="stat-card">
            <p style="color:rgba(255,255,255,0.5); font-size:0.82rem; margin-bottom:6px;">Maior Bolsa</p>
            <h3 style="font-size:1.8rem; font-weight:800;" id="stat-pj">R$ 0</h3>
            <p style="color:var(--color-primary); font-size:0.72rem; margin-top:6px;">Valor máximo</p>
        </div>
        <div class="stat-card">
            <p style="color:rgba(255,255,255,0.5); font-size:0.82rem; margin-bottom:6px;">Candidaturas</p>
            <h3 style="font-size:1.8rem; font-weight:800;" id="stat-candidaturas">0</h3>
            <p style="color:#3b82f6; font-size:0.72rem; margin-top:6px;">Vagas que me candidatei</p>
        </div>
    </div>

    <!-- Busca e Filtros -->
    <div class="flex flex-col md:flex-row gap-3 mb-8">
        <div class="relative flex-1">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"
                style="position:absolute; left:12px; top:50%; transform:translateY(-50%);">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="recom-search" placeholder="Buscar por título, empresa ou tecnologia..."
                oninput="filtrarVagas()"
                style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:10px 12px 10px 36px; border-radius:8px; color:white; font-size:0.9rem; outline:none;">
        </div>
        <select id="recom-filter-tipo" onchange="filtrarVagas()"
            style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px 14px; border-radius:8px; font-size:0.9rem; cursor:pointer; outline:none;">
            <option value="">Todos os tipos</option>
            <option value="CLT">CLT</option>
            <option value="PJ">PJ</option>
            <option value="Freelance">Freelance</option>
            <option value="Estágio">Estágio</option>
        </select>
        <select id="recom-filter-local" onchange="filtrarVagas()"
            style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px 14px; border-radius:8px; font-size:0.9rem; cursor:pointer; outline:none;">
            <option value="">Qualquer local</option>
            <option value="Remoto">Remoto</option>
            <option value="Híbrido">Híbrido</option>
            <option value="Presencial">Presencial</option>
        </select>
    </div>

    <div class="recom-grid" id="recom-list"></div>
</div>

<!-- MODAL DETALHES -->
<div class="modal-overlay" id="vagaDetailsModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>

        <span id="detail-company" style="color:rgba(255,255,255,0.5); font-weight:600; font-size:0.9rem;"></span>
        <h2 id="detail-title" style="font-size:1.8rem; font-weight:800; color:#fff; margin-top:0.3rem;"></h2>

        <div style="display:flex; gap:8px; margin-top:1rem; flex-wrap:wrap;">
            <span id="detail-tipo"
                style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.82rem;"></span>
            <span id="detail-loc"
                style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.82rem;"></span>
            <span id="detail-remun"
                style="background:rgba(233,30,99,0.15); border:1px solid rgba(233,30,99,0.3); color:var(--color-primary); padding:4px 10px; border-radius:20px; font-size:0.82rem;"></span>
            <span id="detail-bolsa"
                style="background:rgba(233,30,99,0.2); border:1px solid rgba(233,30,99,0.4); color:var(--color-accent); padding:4px 10px; border-radius:20px; font-size:0.82rem; font-weight:700; display:none;"></span>
        </div>

        <div class="modal-section">
            <h3 class="modal-section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                Sobre a Vaga
            </h3>
            <p id="detail-desc" style="color:rgba(255,255,255,0.7); line-height:1.6;"></p>
        </div>

        <div class="modal-section">
            <h3 class="modal-section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"></path>
                </svg>
                Requisitos
            </h3>
            <div
                style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); padding:1.2rem; border-radius:10px;">
                <p id="detail-reqs" style="color:rgba(255,255,255,0.8); line-height:1.6; white-space:pre-wrap;"></p>
            </div>
        </div>

        <div style="margin-top:2rem; display:flex; gap:12px;">
            <button class="btn-candidatar" id="btn-candidatar-modal" onclick="candidatarVaga()">Candidatar-se ao
                Desafio</button>
            <button onclick="closeModal()"
                style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:white; border-radius:10px; padding:0 20px; cursor:pointer; font-size:0.95rem;">
                Voltar
            </button>
        </div>
    </div>
</div>

<script>
    let todasVagas = [];
    let currentVaga = null;
    let candidaturas = JSON.parse(localStorage.getItem('trivio_candidaturas') || '[]');

    function salvarCandidaturas() {
        localStorage.setItem('trivio_candidaturas', JSON.stringify(candidaturas));
    }

    function atualizarContadorCandidaturas() {
        const el = document.getElementById('stat-candidaturas');
        if (el) el.textContent = candidaturas.length;
    }

    async function carregarVagas() {
        const listDiv = document.getElementById('recom-list');
        listDiv.innerHTML = '<p style="color:rgba(255,255,255,0.4); grid-column:1/-1; text-align:center; padding:3rem;">Buscando vagas...</p>';
        try {
            const tokenHeader = sessionStorage.getItem('token');
            const headers = { 'Content-Type': 'application/json' };
            if (tokenHeader) headers.Authorization = `Bearer ${tokenHeader}`;

            const res = await fetch('/api/v1/vagas', { headers });
            if (!res.ok) throw new Error();
            todasVagas = await res.json();

            const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
            const userSkillsRaw = (window.userConfig?.skills || window.userBasicData?.skills || usuario.skills || '');
            const userSkills = Array.isArray(userSkillsRaw)
                ? userSkillsRaw.map(s => (s || '').toLowerCase())
                : String(userSkillsRaw).split(/[,;\s]+/).filter(Boolean).map(s => s.toLowerCase());

            const vagasRecomendadas = userSkills.length
                ? todasVagas.filter(v => {
                    const text = [(v.titulo || ''), (v.descricao || ''), (v.requisitos || ''), (v.tipo || ''), (v.empresa_nome || '')]
                        .join(' ').toLowerCase();
                    return userSkills.some(skill => text.includes(skill));
                })
                : todasVagas;

            document.getElementById('stat-total').textContent = vagasRecomendadas.length;
            document.getElementById('stat-total-label').textContent = vagasRecomendadas.length > 0 ? `${vagasRecomendadas.length} disponíveis` : 'Nenhuma no momento';
            document.getElementById('stat-clt').textContent = vagasRecomendadas.filter(v => v.bolsa_tecnica > 0).length;
            const maiorBolsa = vagasRecomendadas.reduce((max, v) => Math.max(max, v.bolsa_tecnica || 0), 0);
            document.getElementById('stat-pj').textContent = maiorBolsa > 0 ? `R$ ${maiorBolsa.toLocaleString('pt-BR')}` : 'R$ 0';
            atualizarContadorCandidaturas();

            renderizarVagas(vagasRecomendadas);
        } catch {
            listDiv.innerHTML = '<p style="color:#ef4444; text-align:center; grid-column:1/-1;">Erro ao carregar vagas.</p>';
        }
    }

    function filtrarVagas() {
        const busca = (document.getElementById('recom-search')?.value || '').toLowerCase();
        const tipo = document.getElementById('recom-filter-tipo')?.value || '';
        const local = document.getElementById('recom-filter-local')?.value || '';

        const filtradas = todasVagas.filter(v => {
            const ok1 = !busca || [v.titulo, v.descricao, v.empresa_nome, v.requisitos].some(s => (s || '').toLowerCase().includes(busca));
            const ok2 = !tipo || (v.tipo || '').toLowerCase() === tipo.toLowerCase();
            const ok3 = !local || (v.localizacao || '').toLowerCase().includes(local.toLowerCase());
            return ok1 && ok2 && ok3;
        });

        renderizarVagas(filtradas);
    }

    function renderizarVagas(vagas) {
        const listDiv = document.getElementById('recom-list');

        if (!vagas.length) {
            listDiv.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:4rem; background:rgba(255,255,255,0.02); border-radius:12px; border:1px dashed rgba(255,255,255,0.1);">
                    <p style="color:rgba(255,255,255,0.6); font-size:1.05rem;">Nenhuma vaga encontrada.</p>
                    <p style="color:rgba(255,255,255,0.4); font-size:0.85rem; margin-top:5px;">Tente outros filtros ou aguarde novas oportunidades.</p>
                </div>`;
            return;
        }

        const nome = v => v.empresa_nome || 'Empresa Parceira';
        const ini = n => n.substring(0, 2).toUpperCase();
        const jaCandidatou = v => candidaturas.includes(v.id);

        listDiv.innerHTML = vagas.map(v => `
            <div class="recom-card" onclick='abrirModal(${JSON.stringify(v).replace(/'/g, "&#39;")})'>
                <div class="recom-company">
                    <div class="company-avatar">${ini(nome(v))}</div>
                    <span class="company-name">${nome(v)}</span>
                    ${jaCandidatou(v) ? `<span style="margin-left:auto; background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:#22c55e; padding:2px 8px; border-radius:20px; font-size:0.72rem; font-weight:700;">Candidatado</span>` : ''}
                </div>
                <h3 class="recom-job-title">${v.titulo}</h3>
                <div class="recom-meta">
                    <span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${v.tipo || 'N/D'}</span>
                    <span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> ${v.localizacao || 'N/D'}</span>
                    ${v.remuneracao ? `<span>R$ ${v.remuneracao}</span>` : ''}
                    ${v.bolsa_tecnica ? `<span style="background:rgba(233,30,99,0.15); border:1px solid rgba(233,30,99,0.25); color:var(--color-accent); font-weight:700;">Bolsa: R$ ${parseFloat(v.bolsa_tecnica).toLocaleString('pt-BR')}</span>` : ''}
                </div>
                <div class="recom-desc">${v.descricao || 'Sem descrição.'}</div>
                <div class="btn-apply">${jaCandidatou(v) ? 'Ver Detalhes' : 'Ver Vaga + Desafio'}</div>
            </div>
        `).join('');
    }

    function abrirModal(vaga) {
        currentVaga = vaga;
        document.getElementById('detail-title').innerText = vaga.titulo;
        document.getElementById('detail-company').innerText = (vaga.empresa_nome || 'Empresa Parceira') + ' · Postada recentemente';
        document.getElementById('detail-tipo').innerText = vaga.tipo || 'Não informado';
        document.getElementById('detail-loc').innerText = vaga.localizacao || 'Não informada';
        document.getElementById('detail-remun').innerText = vaga.remuneracao ? `R$ ${vaga.remuneracao}` : 'A combinar';
        document.getElementById('detail-desc').innerText = vaga.descricao || 'Sem descrição.';
        document.getElementById('detail-reqs').innerText = vaga.requisitos || 'Sem requisitos cadastrados.';

        // Bolsa técnica
        const bolsaEl = document.getElementById('detail-bolsa');
        if (vaga.bolsa_tecnica && vaga.bolsa_tecnica > 0) {
            bolsaEl.textContent = `💰 Bolsa técnica: R$ ${parseFloat(vaga.bolsa_tecnica).toLocaleString('pt-BR')}`;
            bolsaEl.style.display = 'inline-block';
        } else {
            bolsaEl.style.display = 'none';
        }

        const btn = document.getElementById('btn-candidatar-modal');
        if (candidaturas.includes(vaga.id)) {
            btn.textContent = 'Já candidatado';
            btn.disabled = true;
            btn.style.opacity = '0.5';
        } else {
            btn.textContent = 'Candidatar-se ao Desafio';
            btn.disabled = false;
            btn.style.opacity = '1';
        }

        document.getElementById('vagaDetailsModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('vagaDetailsModal').classList.remove('show');
    }

    function candidatarVaga() {
        if (!currentVaga || candidaturas.includes(currentVaga.id)) return;

        const btn = document.getElementById('btn-candidatar-modal');
        btn.textContent = 'Enviando...';
        btn.disabled = true;

        setTimeout(() => {
            candidaturas.push(currentVaga.id);
            salvarCandidaturas();
            atualizarContadorCandidaturas();

            btn.textContent = 'Já candidatado';
            btn.style.opacity = '0.5';

            closeModal();
            renderizarVagas(todasVagas.filter(v => {
                const busca = (document.getElementById('recom-search')?.value || '').toLowerCase();
                const tipo = document.getElementById('recom-filter-tipo')?.value || '';
                const local = document.getElementById('recom-filter-local')?.value || '';
                const ok1 = !busca || [v.titulo, v.descricao, v.empresa_nome, v.requisitos].some(s => (s || '').toLowerCase().includes(busca));
                const ok2 = !tipo || (v.tipo || '').toLowerCase() === tipo.toLowerCase();
                const ok3 = !local || (v.localizacao || '').toLowerCase().includes(local.toLowerCase());
                return ok1 && ok2 && ok3;
            }));

            if (typeof showToast === 'function') {
                showToast(`Candidatura para "${currentVaga.titulo}" enviada!`);
            }
        }, 1200);
    }

    carregarVagas();
</script>
