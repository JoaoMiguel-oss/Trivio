<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ===== CONFIGURAÇÕES BÁSICAS DO DOCUMENTO ===== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivio - Plataforma de Recrutamento</title>

    <!-- ===== TAILWIND CSS - Framework de utilitários CSS ===== -->
    <!-- Carrega o Tailwind CSS via CDN para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ===== LUCIDE ICONS - Biblioteca de ícones ===== -->
    <!-- Carrega os ícones Lucide para usar ícone de pesquisa e outros -->
    <link href="https://cdn.jsdelivr.net/npm/lucide-static/font/lucide.css" rel="stylesheet">

    <!-- ===== CSS DE RESPONSIVIDADE ===== -->
    <!-- Arquivo dedicado com media queries e estilos responsivos -->
    <link href="css/responsive.css" rel="stylesheet">

    <!-- ===== SCRIPT DE CONFIGURAÇÕES ===== -->
    <script src="./modules/configuracoes.js"></script>

    <style>
        /* ===== IMPORTAÇÃO DE FONTE GOOGLE FONTS ===== */
        /* Importa a fonte Inter com todos os pesos (100-900) para uma tipografia moderna */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        /* ===== VARIÁVEIS CSS (Design Tokens) ===== */
        /* Define as cores principais da aplicação em variáveis reutilizáveis */
        :root {
            --color-dark-bg: #1A1A1A;
            /* Cor de fundo escuro principal */
            --color-surface: #242424;
            /* Cor de superfície para cards e elementos */
            --color-primary: #AD1457;
            /* Cor primária rosa/magenta menos vibrante */
            --color-accent: #D81B60;
            /* Cor de destaque rosa menos neon */
        }

        /* ===== ESTILO GLOBAL DO BODY ===== */
        /* Aplica fonte e cores base para toda a aplicação */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-dark-bg);
            color: #FFFFFF;
        }

        /* ===== ESTILO PARA ÍCONES SVG ===== */
        /* Define tamanho padrão para ícones */
        .icon {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        /* ===== ESTILO PARA ITEM DE NAVEGAÇÃO ATIVO ===== */
        /* Destaca o item de menu atualmente selecionado */
        .nav-item-active {
            background-color: var(--color-primary) !important;
            color: white;
        }

        /* ===== EFEITO HOVER PARA BOTÕES ===== */
        /* Adiciona transição suave em botões */
        .btn-hover {
            transition: all 0.2s ease;
        }

        /* Efeito de elevação ao passar o mouse sobre botões */
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }

        /* ===== ESTILO PARA CARDS DE ESTATÍSTICAS ===== */
        /* Cards com gradiente e borda para exibir métricas */
        .card-stat {
            background: linear-gradient(135deg, rgba(233, 30, 99, 0.1), rgba(255, 20, 147, 0.05));
            border: 1px solid rgba(233, 30, 99, 0.2);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Efeito de hover nos cards de estatísticas */
        .card-stat:hover {
            border-color: rgba(233, 30, 99, 0.4);
            background: linear-gradient(135deg, rgba(233, 30, 99, 0.15), rgba(255, 20, 147, 0.1));
        }

        /* ===== ANIMAÇÃO DE FADE IN ===== */
        /* Anima o conteúdo principal ao carregar */
        #main-content {
            animation: fadeIn 0.3s ease-in;
        }

        /* Define a animação de fade in (entrada suave) */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== ESTILO PARA NAVBAR HORIZONTAL ===== */
        /* Estilo específico para a barra de navegação no topo */
        .navbar {
            background-color: #0A0A0A;
            border-bottom: 1px solid #1F1F1F;
        }

        /* ===== ESTILO PARA BOTÃO DE PESQUISA ===== */
        /* Botão circular para o ícone de pesquisa */
        .search-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(233, 30, 99, 0.1);
            border: 1px solid rgba(233, 30, 99, 0.3);
            transition: all 0.2s ease;
        }

        /* Efeito hover no botão de pesquisa */
        .search-button:hover {
            background-color: rgba(233, 30, 99, 0.2);
            border-color: rgba(233, 30, 99, 0.5);
        }

        /* ===== ESTILO PARA ITENS DE NAVEGAÇÃO HORIZONTAL ===== */
        /* Ajusta os itens de menu para layout horizontal */
        .nav-item-horizontal {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        /* Estado hover para itens de navegação */
        .nav-item-horizontal:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* ===== ESTILO PARA BOTÃO DE NOTIFICAÇÕES ===== */
        /* Botão de sino com badge */
        .notification-button {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(233, 30, 99, 0.1);
            border: 1px solid rgba(233, 30, 99, 0.3);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        /* Efeito hover no botão de notificações */
        .notification-button:hover {
            background-color: rgba(233, 30, 99, 0.2);
            border-color: rgba(233, 30, 99, 0.5);
        }

        /* Badge de notificações não lidas */
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background-color: #EF4444;
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0A0A0A;
        }

        /* Dropdown de notificações */
        .notification-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 360px;
            max-height: 400px;
            overflow-y: auto;
            background-color: #1A1A1A;
            border: 1px solid rgba(233, 30, 99, 0.3);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }

        /* Dropdown visível */
        .notification-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        /* Item de notificação não lido */
        .notification-item.unread {
            background-color: rgba(233, 30, 99, 0.1);
        }

        /* Item de notificação lido */
        .notification-item.read {
            background-color: transparent;
        }

        /* Hover no item de notificação */
        .notification-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* ===== ESTILO PARA NOVA ABA PERFIL PROFISSIONAL ===== */
        /* Badge para diferenciar a nova aba */
        .nav-item-new {
            position: relative;
        }

        .nav-item-new::after {
            content: 'NOVO';
            position: absolute;
            top: -8px;
            right: -8px;
            padding: 2px 6px;
            font-size: 9px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <!-- ===== CONTAINER PRINCIPAL ===== -->
    <!-- Estrutura de layout com navbar no topo e conteúdo abaixo -->
    <div class="flex flex-col h-screen">

        <!-- Barra fixa no topo com logo, menu e pesquisa -->
        <nav class="navbar px-6 py-4">
            <div class="flex items-center justify-between">

                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">

            <!-- O conteúdo será injetado aqui dinamicamente pela função loadSection() -->
        </main>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        /**
         * Função: loadSection
         * Descrição: Carrega dinamicamente o conteúdo de um módulo HTML externo
         * 
         * @param {string} sectionName - Nome do módulo a ser carregado (ex: 'bugs', 'pagamentos')
         * @param {HTMLElement} buttonElement - Elemento do botão clicado para atualizar estado ativo
         * 
         * Como funciona:
         * 1. Busca o arquivo HTML do módulo na pasta ./modules/
         * 2. Injeta o HTML no elemento #main-content
         * 3. Atualiza os estilos dos botões para destacar o item ativo
         * 4. Exibe mensagem de erro caso o módulo não seja encontrado
         */
        async function loadSection(sectionName, buttonElement) {
            try {
                // Faz requisição HTTP para buscar o arquivo HTML do módulo
                const response = await fetch(`/Empresas/tela%20principal/modules/${sectionName}.html?v=${Date.now()}`);

                // Verifica se a requisição foi bem-sucedida (status 200)
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                // Extrai o conteúdo HTML da resposta
                const html = await response.text();

                // Injeta o HTML no elemento principal da página
                const mainContent = document.getElementById('main-content');
                mainContent.innerHTML = html;

                // ===== EXECUTA OS SCRIPTS INJETADOS (Necessário quando se usa innerHTML) =====
                const scripts = mainContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                // ===== ATUALIZAÇÃO DO ESTADO VISUAL DOS BOTÕES DE NAVEGAÇÃO =====

                // Seleciona todos os botões de navegação
                const navItems = document.querySelectorAll('.nav-item');

                // Remove a classe 'active' de todos os botões
                navItems.forEach(item => item.classList.remove('nav-item-active'));

                // Adiciona a classe 'active' ao botão clicado
                buttonElement.classList.add('nav-item-active');

                // Define o fundo do botão ativo com a cor primária
                buttonElement.style.backgroundColor = 'var(--color-primary)';

                // Remove o fundo dos outros botões (estado inativo)
                navItems.forEach(item => {
                    if (item !== buttonElement) {
                        item.style.backgroundColor = 'transparent';
                    }
                });

            } catch (error) {
                // ===== TRATAMENTO DE ERRO =====
                // Exibe mensagem de erro caso o módulo não seja encontrado

                console.error(`Erro ao carregar módulo ${sectionName}:`, error);

                // Injeta mensagem de erro visual no conteúdo principal
                document.getElementById('main-content').innerHTML = `
                    <div class="p-6 rounded-lg" style="background-color: var(--color-surface);">
                        <p class="text-red-400 font-semibold mb-2">⚠️ Erro ao carregar conteúdo</p>
                        <p class="text-sm text-gray-400">Módulo: ${sectionName}</p>
                        <p class="text-sm text-gray-400">Caminho esperado: ./modules/${sectionName}.html</p>
                        <p class="text-xs text-gray-500 mt-2">Erro: ${error.message}</p>
                    </div>
                `;
            }
        }

        /**
         * Event Listener: DOMContentLoaded
         * Descrição: Executa código assim que o DOM estiver completamente carregado
         * 
         * Como funciona:
         * 1. Aguarda o carregamento completo da estrutura HTML
         * 2. Busca o botão "Bugs" (primeiro item da navegação)
         * 3. Carrega automaticamente a seção de bugs como conteúdo inicial
         */
        document.addEventListener('DOMContentLoaded', () => {
            // Seleciona o botão de vagas
            const vagasButton = document.querySelector('button[onclick*="vagas"]');

            // Se o botão existir, carrega a seção de vagas
            if (vagasButton) loadSection('vagas', vagasButton);
        });

        // ==========================================
        // FUNÇÕES DE CONFIGURAÇÕES (GLOBAIS)
        // ==========================================

        /* ===== NAVEGAÇÃO ENTRE PAINÉIS ===== */
        function cfgShowPanel(name) {
            document.querySelectorAll('.cfg-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.cfg-nav-item').forEach(i => i.classList.remove('active'));
            const panel = document.getElementById('cfg-panel-' + name);
            const nav = document.getElementById('cfg-nav-' + name);
            if (panel) panel.classList.add('active');
            if (nav) nav.classList.add('active');
        }

        /* ===== TOAST ===== */
        function cfgToast(msg, isError) {
            const t = document.getElementById('cfg-toast');
            const m = document.getElementById('cfg-toast-msg');
            if (!t || !m) return;
            m.textContent = msg;
            t.style.borderColor = isError ? 'rgba(239,68,68,0.5)' : 'rgba(233,30,99,0.4)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        /* ===== SALVAR ===== */
        function cfgSave(tab, btn) {
            const orig = btn.textContent;
            btn.textContent = 'Salvando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            setTimeout(() => {
                btn.textContent = '✓ Salvo!';
                btn.style.opacity = '1';
                cfgToast('Configurações salvas com sucesso!');
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1800);
            }, 750);
        }

        /* ===== CANCELAR ===== */
        function cfgCancel(tab) {
            cfgToast('Alterações descartadas.');
        }

        /* ===== RESTAURAR PADRÕES ===== */
        function cfgRestoreDefaults() {
            if (confirm('Deseja restaurar todas as configurações para o padrão? Esta ação não pode ser desfeita.')) {
                cfgToast('Configurações restauradas para o padrão.');
            }
        }

        /* ===== SENHA - indicador de força ===== */
        function cfgCheckStrength(val) {
            const fill = document.getElementById('cfg-strength-fill');
            const txt = document.getElementById('cfg-strength-txt');
            if (!fill || !txt) return;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { w: '0%', c: 'transparent', l: '' },
                { w: '25%', c: '#ef4444', l: 'Fraca' },
                { w: '50%', c: '#f97316', l: 'Razoável' },
                { w: '75%', c: '#eab308', l: 'Boa' },
                { w: '100%', c: '#22c55e', l: 'Excelente' }
            ];
            const lv = levels[Math.min(score, 4)];
            fill.style.width = lv.w;
            fill.style.background = lv.c;
            txt.textContent = lv.l;
            txt.style.color = lv.c;
        }

        /* ===== ATUALIZAR SENHA ===== */
        function cfgUpdatePassword(btn) {
            const atual = document.getElementById('cfg-senha-atual').value;
            const nova = document.getElementById('cfg-nova-senha').value;
            const conf = document.getElementById('cfg-confirmar-senha').value;
            if (!atual || !nova || !conf) { cfgToast('⚠ Preencha todos os campos.', true); return; }
            if (nova !== conf) { cfgToast('⚠ As senhas não coincidem.', true); return; }
            if (nova.length < 8) { cfgToast('⚠ A senha deve ter pelo menos 8 caracteres.', true); return; }
            cfgSave('seguranca', btn);
            document.getElementById('cfg-senha-atual').value = '';
            document.getElementById('cfg-nova-senha').value = '';
            document.getElementById('cfg-confirmar-senha').value = '';
            cfgCheckStrength('');
        }

        /* ===== 2FA TOGGLE ===== */
        function cfgToggle2FA(btn) {
            const badge = document.getElementById('cfg-2fa-badge');
            const ativo = badge.classList.contains('badge-green');
            if (ativo) {
                badge.className = 'status-badge badge-red';
                badge.textContent = 'Desativado';
                btn.textContent = 'Ativar 2FA';
                cfgToast('2FA desativado.');
            } else {
                badge.className = 'status-badge badge-green';
                badge.textContent = 'Ativado';
                btn.textContent = 'Desativar 2FA';
                cfgToast('2FA ativado com sucesso!');
            }
        }

        /* ===== ENCERRAR SESSÃO ===== */
        function cfgEndSession(sessionId, btn) {
            const el = document.getElementById(sessionId);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'translateX(20px)';
                el.style.transition = 'all 0.3s';
                setTimeout(() => el.remove(), 300);
                cfgToast('Sessão encerrada.');
            }
        }

        /* ===== ENCERRAR TODAS ===== */
        function cfgEndAllSessions(btn) {
            if (!confirm('Deseja encerrar todas as outras sessões? Você permanecerá logado neste dispositivo.')) return;
            document.querySelectorAll('#cfg-sessions .session-item:not(:first-child)').forEach(s => {
                s.style.opacity = '0'; s.style.transition = 'all 0.3s';
                setTimeout(() => s.remove(), 300);
            });
            cfgToast('Todas as outras sessões foram encerradas.');
        }

        /* ===== DELETAR CONTA ===== */
        function cfgConfirmDelete() {
            if (confirm('⚠ Esta ação é irreversível! Deseja realmente deletar sua conta?')) {
                cfgToast('Entre em contato com o suporte para concluir.', true);
            }
        }

        /* ===== CONTATO - ENVIAR ===== */
        function cfgSubmitContact(e) {
            e.preventDefault();
            const btn = document.getElementById('cfg-contact-btn');
            const orig = btn.textContent;
            btn.textContent = 'Enviando...';
            btn.disabled = true;
            setTimeout(() => {
                btn.textContent = '✓ Enviado!';
                cfgToast('Mensagem enviada! Entraremos em contato em breve.');
                e.target.reset();
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
            }, 900);
        }

        /* ===== ATIVAR OU DESATIVAR TODAS NOTIFICAÇÕES ===== */
        function cfgSelectAllNotif(state) {
            document.querySelectorAll('#cfg-panel-notificacoes input[type="checkbox"]').forEach(cb => cb.checked = state);
            cfgToast(state ? 'Todas as notificações ativadas.' : 'Todas as notificações desativadas.');
        }

        /* ===== FORMATAR CEP ===== */
        function cfgFormatCEP(input) {
            let v = input.value.replace(/\D/g, '').substring(0, 8);
            if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
            input.value = v;
        }

        /* ===== PREVIEW DE AVATAR ===== */
        function cfgPreviewAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            cfgToast('Foto selecionada: ' + file.name);
        }

        // ==========================================
        // FUNÇÕES DO PERFIL (GLOBAIS)
        // ==========================================

        /* ===== MOSTRA PAINEL CORRESPONDENTE ===== */
        function showPanel(panelName) {
            // Esconde todos os painéis
            document.querySelectorAll('.content-panel').forEach(p => {
                p.classList.remove('active');
            });

            // Remove estado ativo de todos os itens da sidebar
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Mostra o painel solicitado
            const panel = document.getElementById('panel-' + panelName);
            const navItem = document.getElementById('nav-' + panelName);

            if (panel) panel.classList.add('active');
            if (navItem) navItem.classList.add('active');
        }

        /* ===== TOAST DE FEEDBACK ===== */
        function showToast(message) {
            const toast = document.getElementById('profileToast');
            const msgEl = document.getElementById('toastMessage');
            if (!toast || !msgEl) return;

            msgEl.textContent = message || 'Salvo com sucesso!';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        /* ===== SELETOR DE CORES DO TEMA ===== */
        function selectColor(el, color) {
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            // Aplica a cor em toda a plataforma como preview
            document.documentElement.style.setProperty('--color-primary', color);
            showToast('Cor de tema atualizada!');
        }

        // ==========================================
        // SISTEMA DE NOTIFICAÇÕES
        // ==========================================

        /**
         * Dados mockados de notificações
         * Estruturado para fácil integração com API futura
         */
        let notifications = [
            {
                id: 1,
                type: 'completion',
                user: 'Carlos Silva',
                challenge: 'Login não funciona',
                company: 'Google Workspace',
                time: Date.now() - 300000, // 5 min atrás
                read: false
            },
            {
                id: 2,
                type: 'new_challenge',
                user: null,
                challenge: 'Memory leak em produção',
                company: 'Analytics Platform',
                time: Date.now() - 1800000, // 30 min atrás
                read: false
            },
            {
                id: 3,
                type: 'completion',
                user: 'Ana Rodrigues',
                challenge: 'API timeout aleatório',
                company: 'Netflix Clone',
                time: Date.now() - 3600000, // 1h atrás
                read: false
            },
            {
                id: 4,
                type: 'completion',
                user: 'Pedro Santos',
                challenge: 'CSS responsivo quebrado',
                company: 'E-commerce XYZ',
                time: Date.now() - 7200000, // 2h atrás
                read: true
            },
            {
                id: 5,
                type: 'new_challenge',
                user: null,
                challenge: 'Segurança SQL Injection',
                company: 'Social Network',
                time: Date.now() - 14400000, // 4h atrás
                read: true
            }
        ];

        /**
         * Função que formata o tempo relativo
         * @param {number} timestamp - Timestamp em milissegundos
         * @returns {string} Tempo formatado
         */
        function formatNotificationTime(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);

            if (minutes < 1) return 'Agora mesmo';
            if (minutes < 60) return `${minutes} min atrás`;
            if (hours < 24) return `${hours}h atrás`;
            return `${Math.floor(hours / 24)} dias atrás`;
        }

        /**
         * Função que renderiza a lista de notificações
         */
        function renderNotifications() {
            const container = document.getElementById('notifications-list');
            if (!container) return;

            // Ordena por tempo (mais recentes primeiro)
            const sortedNotifications = [...notifications].sort((a, b) => b.time - a.time);

            let html = '';
            sortedNotifications.forEach(notif => {
                const isRead = notif.read ? 'read' : 'unread';
                const iconColor = notif.read ? 'text-gray-400' : 'text-pink-500';

                // Ícone baseado no tipo de notificação
                let icon = '';
                if (notif.type === 'completion') {
                    icon = `<svg class="w-5 h-5 ${iconColor}" viewBox="0 0 24 24">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 4L12 14.01l-3-3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>`;
                } else {
                    icon = `<svg class="w-5 h-5 ${iconColor}" viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>`;
                }

                // Texto da notificação
                let text = '';
                if (notif.type === 'completion') {
                    text = `<strong>${notif.user}</strong> concluiu o desafio <strong>${notif.challenge}</strong>`;
                } else {
                    text = `Novo desafio técnico disponível: <strong>${notif.challenge}</strong>`;
                }

                html += `
                    <div 
                        class="notification-item ${isRead} p-4 border-b cursor-pointer transition" 
                        style="border-color: rgba(255,255,255,0.05);"
                        onclick="markAsRead(${notif.id}, this)">
                        <div class="flex gap-3">
                            <div class="flex-shrink-0 mt-1">
                                ${icon}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm text-gray-300">${text}</p>
                                <p class="text-xs text-gray-500 mt-1">${formatNotificationTime(notif.time)}</p>
                            </div>
                            ${!notif.read ? '<div class="flex-shrink-0"><span class="w-2 h-2 rounded-full" style="background-color: var(--color-primary);"></span></div>' : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Atualiza o badge
            updateNotificationBadge();
        }

        /**
         * Função que atualiza o badge de notificações
         */
        function updateNotificationBadge() {
            const unreadCount = notifications.filter(n => !n.read).length;
            const badge = document.getElementById('notification-badge');

            if (badge) {
                badge.textContent = unreadCount;
                badge.style.display = unreadCount > 0 ? 'flex' : 'none';
            }
        }

        /**
         * Função que marca uma notificação como lida
         * @param {number} id - ID da notificação
         * @param {HTMLElement} element - Elemento do DOM clicado
         */
        function markAsRead(id, element) {
            const notif = notifications.find(n => n.id === id);
            if (notif && !notif.read) {
                notif.read = true;
                element.classList.remove('unread');
                element.classList.add('read');

                // Remove o indicador de não lido
                const indicator = element.querySelector('.rounded-full');
                if (indicator) indicator.remove();

                updateNotificationBadge();
            }
        }

        /**
         * Função que marca todas as notificações como lidas
         * @param {Event} event - Evento do clique
         */
        function markAllAsRead(event) {
            event.stopPropagation();
            notifications.forEach(n => n.read = true);
            renderNotifications();
        }

        /**
         * Função que alterna a visibilidade do dropdown de notificações
         */
        function toggleNotifications() {
            const dropdown = document.getElementById('notification-dropdown');
            dropdown.classList.toggle('show');

            // Renderiza as notificações ao abrir
            if (dropdown.classList.contains('show')) {
                renderNotifications();
            }
        }

        // Fecha o dropdown quando clicar fora
        document.addEventListener('click', function (event) {
            const dropdown = document.getElementById('notification-dropdown');
            const button = document.querySelector('.notification-button');

            if (dropdown && !dropdown.contains(event.target) && !button.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });
    </script>
